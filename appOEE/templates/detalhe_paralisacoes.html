{% extends 'base.html' %}
{% load static %}

{% block titulo %}Prejuízos Financ_Maquina{% endblock %}


{% block body %}
<div class="container">
    <h2 style="text-align: center;"> <span id = "" >Detalhamento dos Índices Financeiros</span></h2>
    <div class="row">
        <div class="col graf_paralis">
            <div class="card">
                <div class="card-body">
                    <h4 class="card-title">Custo/máquina R$</h4>
                    <p class="card-text"></p>
                    <canvas id="Chartmaq_custo" style="width: 100%;"></canvas>
                </div>
            </div>
        </div>
        <div class="col graf_paralis">
            <div class="card" >
                <div class="card-body">
                    <h4 class="card-title">Prejuízo/máquina R$</h4>
                    <p class="card-text"></p>
                    <canvas id="Chartmaq_prejuizo" style="width: 100%;"></canvas>
                </div>
            </div>
        </div>
    </div>
    <br>
    <div class="row">
        <div class="col graf_paralis">
            <div class="card" >
                <div class="card-body">
                    <canvas id="waterfallChart" style="width: 100%;"></canvas>
                </div>
            </div>
        </div>        
    </div>
    <br>
</div>

<script>
fetch("/detalhes_waterfall/")
    .then(r => r.json())
    .then(dados => {
        const ctx = document.getElementById("waterfallChart");
        if (!ctx) return;

        // Registro local para garantir funcionamento
        const annotationPlugin = window['chartjs-plugin-annotation'];
        if (annotationPlugin) {
            Chart.register(annotationPlugin);
        }

        new Chart(ctx, {
            type: "bar",
            data: {
                labels: dados.labels,
                datasets: [{
                    label: "Resultado Financeiro",
                    data: dados.valores,
                    backgroundColor: dados.valores.map((v, index) => {
                        const valor = v[1] - v[0];
                        if (index === 0) return "rgba(69, 56, 192, 0.66)"; // Azul para a primeira barra (Faturamento)
                        if (index === dados.valores.length - 1) return "rgba(220, 53, 70, 0.76)"; // Verde para o resultado final
                        return valor < 0 ? "rgba(220, 53, 70, 0.66)" : "#27AE60"; // Vermelho se subtrai, verde se soma
                    }),
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: 'Análise dos Resultados Financeiros Operacionais',
                        font: { size: 24, weight: 'bold' }
                    },
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                const v = ctx.raw;
                                const valor = v[1] - v[0];
                                return "R$ " + valor.toLocaleString("pt-BR");
                            }
                        }
                    },                                
                    datalabels: {
                        anchor: 'end',
                        align: 'top',
                        formatter: (v) => {
                            const valor = v[1] - v[0]; 
                            return 'R$ ' + (Math.abs(valor) / 1000).toFixed(0) + ' mil';
                        },
                        font: { weight: 'bold',size: 16 },
                        offset: 4
                    },
                    annotation: {
                        annotations: {
                            zeroLine: {
                                type: 'line',
                                yMin: 0,
                                yMax: 0,
                                borderColor: '#e3e3e3',
                                borderWidth: 1,
                                borderDash: [3, 6],
                                label: {
                                    display: true,
                                    content: '',
                                    position: 'end'
                                }
                            }
                        }
                    }
                },
                scales: {
                    y: {
                            beginAtZero: true,
                            min: -1400000,
                            max:  3000000,
                            grid: {
                                drawOnChartArea: true,
                                drawTicks: true,
                                // Isso força a cor da linha zero especificamente no grid
                                color: (context) => (context.tick.value === 0 ? 'rgba(77, 72, 71, 0.5)' : 'rgba(0, 0, 0, 0.1)'),
                                lineWidth: (context) => (context.tick.value === 0 ? 2 : 1),
                            },
                            border: {
                                display: true // Garante a linha lateral do eixo Y
                            },
                        
                            ticks: { font: { size: 14, weight: 'bold' } }
                        },
                    x: {
                        ticks: { font: { size: 16, weight: 'bold' } }
                    }
                }
            }
        });
    });
</script>

{% endblock %}
