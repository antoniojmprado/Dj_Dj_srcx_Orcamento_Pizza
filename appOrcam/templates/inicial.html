
{% load static %}


{% block titulo %}Apresentação{% endblock %}
{% block extra_head %}
<style>

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

.btn_home{
    display: inline-block;
    padding: 10px 20px;
    background-color: #ffffff;
    color: #000000;
    text-decoration: none;
    border-radius: 5px;
    font-size: 18px;
    transition: background-color 0.3s ease;
}

.content {
    position: relative;
    z-index: 1;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    color: #fff;
    text-align: center;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.video-bg {
    position: fixed;
    inset: 0;
    z-index: -2;
}

.video-bg video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#acesso_navBar{
    display: none;
}

</style>
{% endblock %}


{% block body %}

<div class="video-bg">
    <video autoplay muted loop playsinline>
       <!-- <source src="{% static 'videos/Divulgacao - compacted.mp4' %}" type="video/mp4">-->
        <source src="{% static 'videos/tempo_passando.mov' %}" type="video/mp4">
    </video>
</div>

<div class="overlay"></div>

<div class="content">
    <h1>Bem-vindo ao Sistema ORÇAMENTOS</h1>
    <h3>Gestão Senhor Caixa</h3>
    <a href="{% url 'listar_orcamentos' %}" class="btn_home">
        Acessar
    </a>
    <hr>
    <h4>Marisa Endruveit & Antonio Prado - v Mar/26</h4>
</div>

{% endblock %}
